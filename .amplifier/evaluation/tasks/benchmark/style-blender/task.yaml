# Vendored benchmark task: style_blender
#
# Source: the amplifier-evaluation library builtin benchmark suite. In a source
# checkout that suite lives at amplifier-bundle-evaluation/amplifier-benchmark/
# tasks/style_blender/ (in a wheel install it is force-included under
# amplifier_evaluation/benchmark/tasks/).
#
# Vendored (copied) here so runs are reproducible and independent of the library.
# The library split identity across meta.yaml + task.yaml; this consolidates them
# into our single-file schema:
#   library meta.yaml {name,difficulty,categories,timeout} -> id/difficulty/categories/timeout
#   library task.yaml `instructions:`                       -> `scenario:` (verbatim)
#   library grader.yaml                                     -> sibling grader.yaml (+ our `type:`)
#   library profile.yaml                                    -> sibling profile.yaml
# The library task ships no workspace/ or grader-data/, so we seed an empty
# workspace/ with .gitkeep (the loader requires workspace/ to exist).
#
# CAVEAT (copied verbatim, not fixed): the grader's `run_with_test_data`
# evaluation instructs the grader to use provided test data in data/
# (minimalist_prose/ and gothic_horror/), but the library task ships NO such
# grader-data/ assets. That reference is preserved as-is from the library grader;
# no data/ directory is vendored because none exists upstream.
#
# Source task id: `style_blender`. Our id uses hyphens (`style-blender`) because
# the harness derives the Incus container name from the task id and Incus rejects
# underscores.
id: style-blender
description: >
  Agent must build a "Style Blender" CLI tool that analyzes writing samples from
  2+ authors, extracts each author's style profile, intelligently blends them into
  a new voice, and generates sample blog posts in that blended style, via a
  3-stage pipeline with timestamped diagnostic output and a clean output/ subdir.
  A cli_tool + ai_tool task.
difficulty: medium
categories: [cli_tool, ai_tool]

# Per-trial timeout in seconds for the agent run (from the library meta.yaml).
timeout: 5400

# The deliverable the grader inspects after extraction. The library task pins the
# code location ("Place all the code under the directory scenarios/style_blender")
# and the grader explores that directory, then runs the tool. The runtime outputs
# land in a timestamped directory (.data/style_blender/TIMESTAMP/) with a clean
# output/ subdir; those paths are the agent's choice, so the representative
# deliverable is the tool itself.
deliverable:
  path: /workspace/scenarios/style_blender
  description: >
    The "Style Blender" CLI tool source plus a README.md, placed under
    scenarios/style_blender. Runtime outputs go to a timestamped directory
    (e.g. .data/style_blender/TIMESTAMP/) holding writer profiles, the blended
    profile, prompts, an index.md, and a clean output/ subdirectory of generated
    samples; those output paths are the agent's choice.

# References to the sibling files, resolved by the loader.
grader: grader.yaml
profile: profile.yaml

# The scenario handed to the AI User, verbatim from the library task.yaml
# `instructions:` field so the task's difficulty and signal are preserved.
scenario: |
  Create a tool called "Style Blender" that blends writing styles from multiple authors to create unique voice profiles. The tool should analyze writing samples from 2+ authors, extract their individual style characteristics, then intelligently blend them to create a new, harmonious writing voice. Place all the code under the directory scenarios/style_blender.

  Key Requirements:

  1. Input Handling:
     - Accept text files (.md and .txt) from multiple authors
     - Support individual files OR directories of samples (each file or directory = one writer)
     - Minimum of 2 authors required to blend styles
     - For each writer, read up to 5 files with approximately 3,000 characters each (~15K total per writer)

  2. 3-Stage Pipeline Architecture:

     Stage 1: Style Analysis
     - For each writer separately, extract their writing style characteristics including:
       * Tone and voice
       * Vocabulary choices
       * Sentence structure patterns
       * Common phrases and patterns
       * Paragraph organization
     - Create a StyleProfile for each writer
     - Save individual profiles to JSON files for diagnostics

     Stage 2: Style Blending
     - Intelligently combine the individual style profiles (not just averaging)
     - Synthesize tone and voice elements
     - Blend structural patterns (paragraph length, sentence structure, etc.)
     - Create an attribution map showing each writer's contributions
     - Produce a BlendedStyleProfile
     - Save blended profile and the blending prompt used to disk

     Stage 3: Content Generation
     - Generate 3-5 sample blog posts (300-500 words each) in the blended style
     - Use different topic categories for variety
     - Apply the blended style naturally to the generated content
     - Save generation prompts for diagnostics

  3. Output Organization:
     - Create a timestamped output directory (e.g., `.data/style_blender/TIMESTAMP/`)
     - Save all diagnostic files to the root of the output directory:
       * Individual writer profiles (writer_*.json)
       * Blended profile (blended_profile.json)
       * All prompts used (prompt_*.txt)
       * Index file (index.md) with overview and links
     - Create a clean `output/` subdirectory containing only the generated sample writings
     - The output/ subdirectory should be ready to use with other tools without clutter

  4. CLI Interface:
     - Use Click for the CLI
     - Support specifying input files/directories
     - Support configuring number of samples to generate (default 3)
     - Allow custom output directory specification
     - Include verbose mode for detailed logging

  5. Technical Requirements:
     - Use Python with proper type hints
     - Use the ANTHROPIC_API_KEY environment variable for API access
     - Implement proper error handling and validation
     - Fail fast if less than 2 writers are provided
     - Fail fast if API key is missing
     - Use async/await for AI interactions
     - Follow the project's style guide (pathlib, type hints, etc.)

  6. Documentation:
     - Create a README.md under scenarios/style_blender/ that includes:
       * Overview of what the tool does and the problem it solves
       * Feature list
       * Quick start examples showing different input patterns
       * Detailed usage instructions with examples
       * Explanation of the 3-stage pipeline
       * Description of output structure and files
       * Troubleshooting section
       * Integration examples

  The tool should make it easy for users who want to generate content in a unique voice that combines elements from writers they admire, without plagiarizing anyone's work directly.
