# Vendored from the amplifier-evaluation library builtin suite:
# amplifier-benchmark/tasks/product_review_finder/grader.yaml
#
# The library grader.yaml carried an `evaluations:` list with `steps` + `rubric`
# but no type discriminator (the library had a single hardcoded rubric grader).
# The only adaptation for our harness is the top-level `type: model_rubric` that
# our grader factory (graders/__init__.py make_grader) dispatches on. The weighted
# evaluations, their steps, and the point-weighted rubrics are copied verbatim so
# the grading signal is identical to the library task.
type: model_rubric
evaluations:
- name: capabilities
  weight: 0.4
  steps: |
    NOTE: The solution may use either direct LLM API calls (OpenAI, Anthropic) or an Agent SDK such as Claude Agent/Code SDK, Microsoft Amplifier (https://github.com/microsoft/amplifier/tree/next), OpenAI Codex CLI, or others that are similarly capable. Both approaches are acceptable. If an Agent SDK is used, its built-in LLM capabilities count as satisfying the LLM usage checks for each stage below.

    1. Explore the code under scenarios/product_review_finder/ to understand the full implementation.
    2. Check that the solution uses **ddgs** (Dux Distributed Global Search, https://pypi.org/project/ddgs/) for finding reviews. Verify it is listed in dependency files and actually imported and used in the code.
    3. Check for a **writer** component that uses an LLM to create the initial markdown report draft (consensus, strengths, weaknesses, ratings, quotes, citations, recommendation).
    4. Check for an **accuracy-reviewer** that uses an LLM to verify all claims are properly cited and nothing is misrepresented or fabricated.
    5. Check for a **completeness-reviewer** that uses an LLM to check that all required sections are present and comprehensive enough.
    6. Check for a **synthesis-reviewer** that uses an LLM to verify the report provides coherent analysis across sources and actionable recommendations, not just listing facts.
    7. Check for **feedback loops**: when a reviewer finds issues, the draft goes back to the writer for fixes and then back through the reviewers.
    8. Check for **sequential review**: after the writer makes changes, the draft goes back through all previous reviewers (not just the one that failed).
    9. Check for support for **user feedback** with [bracket-enclosed-comments] that triggers another write-and-review cycle.
    10. Check for a **--category flag** (optional) to narrow down search results.
    11. Verify the solution uses a recent, up-to-date LLM from Anthropic or OpenAI. If an Agent SDK is used, check which model it is configured with. Check the model identifier in the code against these references:
        - Anthropic models: https://platform.claude.com/docs/en/about-claude/models/overview
        - OpenAI models: https://platform.openai.com/docs/models
  rubric:
    ddgs_dependency:
      points: 10
      description: Does the solution use ddgs for finding reviews? Check both dependency files and actual imports/usage in code.
    writer_uses_llm:
      points: 10
      description: Is there a writer component that uses an LLM to create the initial markdown report draft? Agent SDKs with built-in LLM capabilities count.
    accuracy_reviewer_uses_llm:
      points: 10
      description: Is there an accuracy-reviewer that uses an LLM to validate citations and check for hallucinations? Agent SDKs with built-in LLM capabilities count.
    completeness_reviewer_uses_llm:
      points: 10
      description: Is there a completeness-reviewer that uses an LLM to check for all required sections? Agent SDKs with built-in LLM capabilities count.
    synthesis_reviewer_uses_llm:
      points: 10
      description: Is there a synthesis-reviewer that uses an LLM to validate coherent analysis and recommendations? Agent SDKs with built-in LLM capabilities count.
    feedback_loops:
      points: 10
      description: Does the code implement feedback loops where reviewers can send work back to the writer?
    sequential_review:
      points: 5
      description: After writer changes, do drafts go back through all previous reviewers (not just the one that failed)?
    user_feedback:
      points: 5
      description: Is there support for user feedback with bracket-enclosed comments?
    category_flag:
      points: 5
      description: Is there a --category flag to narrow down search results?
    uses_recent_model:
      points: 25
      description: Does it use a recent model from Anthropic (see https://platform.claude.com/docs/en/about-claude/models/overview) or OpenAI (see https://platform.openai.com/docs/models)? If an Agent SDK is used, check which model it is configured with. 5 points partial credit if a model is used but it is not recent.
- name: run_and_validate
  weight: 0.6
  steps: |
    1. Find the README in the project directory that explains how to use the tool.
    2. Based on the README, determine the correct command to run the tool with a simple test product like "ROG Xbox Ally X".
    3. If the README mentions the --category flag, optionally test with --category "handheld game console".
    4. Run the tool. This may take up to 15 minutes as it needs to search the web and go through multiple review stages.
       - If the tool fails or times out, note an overall score of 0 for this test!
    5. Verify the CLI interface:
       - Tool accepts a product name as input
       - Tool runs without crashing or errors
       - Tool provides clear output or progress messages
       - Tool completes successfully
    6. Find the generated markdown output file:
       - Should be timestamped and named after the product
       - Should be a valid markdown file (.md extension)
    7. Examine the markdown report structure - check if it includes:
       - Overall consensus on product quality
       - Key strengths section
       - Key weaknesses section
       - Ratings or scores from reviews
       - Direct quotes from sources
       - Citations with URLs
       - A final recommendation
    8. Verify citations are present and properly formatted with URLs.
  rubric:
    readme_exists:
      points: 5
      description: Does a README exist with clear usage instructions?
    tool_runs_successfully:
      points: 20
      description: Does the tool run without errors or crashes?
    cli_accepts_product:
      points: 5
      description: Does the CLI accept a product name as input?
    tool_completes:
      points: 10
      description: Does the tool complete successfully within reasonable time?
    markdown_output_created:
      points: 10
      description: Is a timestamped markdown file created?
    has_consensus:
      points: 10
      description: Does the report include an overall consensus section?
    has_strengths:
      points: 8
      description: Are key strengths identified?
    has_weaknesses:
      points: 8
      description: Are key weaknesses identified?
    has_ratings:
      points: 5
      description: Are ratings or scores mentioned?
    has_quotes:
      points: 5
      description: Are there direct quotes from sources?
    has_citations:
      points: 10
      description: Are there citations with URLs?
    has_recommendation:
      points: 4
      description: Is there a final recommendation?
