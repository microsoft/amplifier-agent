# Vendored from the amplifier-evaluation library builtin suite:
# amplifier-benchmark/tasks/product_review_finder/profile.yaml
#
# DTU profile for the product_review_finder evaluation task: a clean Ubuntu 24.04
# environment with uv installed and outbound internet access (needed for ddgs web
# search of product reviews).
#
# Like our other task profiles (see tasks/custom/websearch-pdf/profile.yaml), it
# installs NO agent-under-test: installing the agent is the agent's job (see
# agents/<name>/install.yaml), so the same environment can host any competitor.
#
# The library profile forwards both an anthropic and an openai passthrough
# service, both kept as-is. The scenario allows either provider for LLM calls, so
# Anthropic alone suffices; the openai passthrough is harmless if unset.
name: eval-task-product-review-finder
description: >
  Evaluation task environment for product_review_finder. Ubuntu 24.04 with uv,
  outbound internet, and Anthropic/OpenAI key passthrough. No agent is installed
  here.

base:
  image: ubuntu:24.04

passthrough:
  allow_external: true
  services:
    - name: anthropic
      key_env: ANTHROPIC_API_KEY
    - name: openai
      key_env: OPENAI_API_KEY

provision:
  setup_cmds:
    - apt-get update && apt-get install -y --no-install-recommends git curl ca-certificates && rm -rf /var/lib/apt/lists/*
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - mkdir -p /workspace

readiness:
  - name: uv-installed
    command: uv --version
