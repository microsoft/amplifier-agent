type: model_rubric
evaluations:
- name: check_discrepancies
  weight: 1.0
  steps: |
    The purpose of this task is to verify whether the agent could correctly verify a set of 5 discrepancies in the documentation that were injected versus the actual implementation/behavior of the code.
    This the report of discrepancies that were injected:

    # Injected Discrepancies
    {{INJECTED_DISCREPANCIES}}

    # Steps
    Please follow these steps to evaluate the agent's findings:

    1. Check if DISCREPANCIES.md exists in the /workspace directory.
    2. If it exists, read the contents of DISCREPANCIES.md.
    3. Review the file to determine if each of the following 5 discrepancies was correctly identified. For each discrepancy, the agent should have identified the core issue - exact wording is not required.
    4. For each discrepancy, determine if the agent identified the core issue. The agent may have used different wording or found additional context, but should have identified the fundamental mismatch.
    5. Do NOT penalize the agent for finding additional discrepancies beyond the ones that were injected. Only evaluate whether these specific 5 were found.
  rubric:
    file_created:
      points: 5
      description: Does DISCREPANCIES.md exist in /workspace? Award 5 points if yes, 0 if no.
    discrepancy_1_config_get:
      points: 19
      description: Did the agent identify that config.get() raises an exception (not returns None) when option not found? Award 19 points if correctly identified, 0 if missed.
    discrepancy_2_validator_order:
      points: 19
      description: Did the agent identify that validators run in insertion order (not alphabetical)? Award 19 points if correctly identified, 0 if missed.
    discrepancy_3_table_transformer_query:
      points: 19
      description: Did the agent identify that table_transformer is disabled/skipped when --query is used (not applied after)? Award 19 points if correctly identified, 0 if missed.
    discrepancy_4_logging_flags:
      points: 19
      description: Did the agent identify that --only-show-errors and --verbose cannot be combined (raises error)? Award 19 points if correctly identified, 0 if missed.
    discrepancy_5_choices_order:
      points: 19
      description: Did the agent identify that choices are sorted alphabetically in help (not definition order)? Award 19 points if correctly identified, 0 if missed.
