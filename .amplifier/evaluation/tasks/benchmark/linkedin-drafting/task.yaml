# Vendored benchmark task: linkedin_drafting
#
# Source: the amplifier-evaluation library's builtin benchmark suite, at
# amplifier-bundle-evaluation/amplifier-benchmark/tasks/linkedin_drafting/ in a
# source checkout.
#
# Vendored (copied) here so runs are reproducible and independent of the library.
# The library split identity across meta.yaml + task.yaml; this consolidates them
# into our single-file schema:
#   library meta.yaml {name,difficulty,categories,timeout} -> id/difficulty/categories/timeout
#   library task.yaml `instructions:`                       -> `scenario:` (verbatim)
#   library grader.yaml                                     -> sibling grader.yaml (+ our `type:`)
#   library profile.yaml                                    -> sibling profile.yaml
# The library task ships a grader-data/ dir (past_posts/ samples and topic_notes.txt
# the grader feeds the tool at grade time); it is copied verbatim to grader-data/
# here. It ships no workspace/, so this task seeds an empty workspace/ (loader
# requires a workspace/ directory).
#
# NOTE: this task's `capabilities` grader includes an `image_generation` criterion
# (15 pts) that requires the tool to call an actual image generation API such as
# DALL-E 3 or gpt-image-1, which are OpenAI-only; the `run_and_validate` grader also
# looks for generated images embedded in the post. Anthropic offers no image
# generation, so full credit on this task requires OPENAI_API_KEY at run time. Our
# 3 agents route to Anthropic only, so they cannot earn the image_generation points
# unless an OpenAI key is present. See the batch report; flagged as needs
# OPENAI_API_KEY. The openai passthrough is kept in profile.yaml for this reason.
#
# Source task id: `linkedin_drafting`. Our id uses hyphens (`linkedin-drafting`)
# because the harness derives the Incus container name from the task id, and Incus
# rejects underscores.
id: linkedin-drafting
description: >
  Agent must build a multi-stage tool that drafts a LinkedIn post from topic notes,
  learning voice from a directory of past posts, covering topic/metaphor discovery,
  drafting, research, style matching, review, actual image generation, and an
  optional shortened social version. Graded on capabilities plus a run against
  sample posts and notes. A hard cli_tool + ai_tool task.
difficulty: hard
categories: [cli_tool, ai_tool]

# Per-trial timeout in seconds for the agent run (from the library meta.yaml).
timeout: 4500

# The deliverable the grader inspects after extraction. The library task has the
# tool output a finished LinkedIn post (plus generated images and an optional
# social version); the agent chooses the exact output filename and the grader
# locates the generated post. This path is the expected/representative location
# under /workspace.
deliverable:
  path: /workspace/post.md
  description: >
    The finished LinkedIn post formatted for LinkedIn, matching the user's style
    from past posts and using a creative metaphor from an unexpected domain, with
    any generated images embedded and optionally a shortened social media version.
    The exact output filename is the agent's choice and the grader locates it.

# References to the sibling files, resolved by the loader.
grader: grader.yaml
profile: profile.yaml

# The scenario handed to the AI User, verbatim from the library task.yaml
# `instructions:` field so the task's difficulty and signal are preserved.
scenario: |
  I need help creating a tool for drafting my LinkedIn posts. My writing process has several stages and I'd like to automate it.

  Here's how I typically write:
  - Start by figuring out what's important and pick topics to cover
  - Find a metaphor or story that makes technical concepts accessible
  - Draft explanations for any jargon I need to use
  - Write some rough creative paragraphs
  - Come up with image prompts for visuals
  - Do research to find references and incorporate them
  - Clean up the draft to match my previous writing style
  - Generate images
  - Check the logic and reasoning
  - Review and edit
  - Create a shorter version for social media if needed

  I have a folder with my past LinkedIn posts that the tool should analyze to learn my style and tone.

  The tool should output the finished post formatted for LinkedIn, any generated images, and optionally a shortened social media version. Look at other tools for inspiration if needed.
  You have an OPENAI_API_KEY and ANTHROPIC_API_KEY available for any LLM or image API calls you need to make.
