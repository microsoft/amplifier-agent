# Vendored from the amplifier-evaluation library builtin suite:
# amplifier-benchmark/tasks/pdf-hr-q3/grader.yaml
#
# The library grader.yaml carried an `evaluations:` list with `steps` + `rubric`
# but no type discriminator (the library had a single hardcoded rubric grader).
# The only adaptation for our harness is the top-level `type: model_rubric` that
# our grader factory (graders/__init__.py make_grader) dispatches on. The single
# weighted evaluation, its steps, and the point-weighted rubric are copied
# verbatim so the grading signal is identical to the library task.
type: model_rubric
evaluations:
- name: end_to_end
  weight: 1.0
  steps: |
    1. Find and read the file `data_analysis_answer.txt` in /workspace/.
       - If the file is missing or empty, assign a score of 0.
    2. Extract the numeric answer from the file. Accept any of these formats (all equivalent):
       - "$104,700"
       - "104700"
       - "$104,700.00"
       - "USD 104,700"
       Strip currency prefixes (USD, $), commas, and whitespace before comparing.
    3. The expected groundtruth value is 104,700.00 USD (median base salary for employees paid in USD at level L4 in the AMER region).
    4. Compute the percent difference between the extracted value and 104,700.
    5. Award the points based on tolerance:
       - Within 1% of groundtruth ($103,653 to $105,747): full points.
       - Outside 1%: 0 points.
  rubric:
    answer_within_tolerance:
      points: 100
      description: Is the answer in data_analysis_answer.txt within 1% of the groundtruth value $104,700 USD (i.e. between $103,653 and $105,747)?
