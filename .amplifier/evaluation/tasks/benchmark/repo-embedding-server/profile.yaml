# Vendored from the amplifier-evaluation library builtin suite:
# amplifier-benchmark/tasks/repo_embedding_server/profile.yaml
#
# DTU profile for the repo_embedding_server evaluation task: a clean Ubuntu 24.04
# environment with uv installed and outbound internet access. Unlike the common
# task template, this profile ALSO installs Ollama and pre-pulls the embedding
# model the task requires (embeddinggemma:300m-qat-q8_0), plus a second readiness
# probe for ollama. That extra provisioning is preserved verbatim from the library.
#
# Like our other task profiles (see tasks/custom/websearch-pdf/profile.yaml), it
# installs NO agent-under-test: installing the agent is the agent's job (see
# agents/<name>/install.yaml), so the same environment can host any competitor.
#
# The library profile forwards both an anthropic and an openai passthrough
# service, both kept as-is. This task embeds via local Ollama and needs neither
# provider key for its core flow; the passthroughs are harmless if unset.
name: eval-task-repo-embedding-server
description: >
  Evaluation task environment for repo_embedding_server. Ubuntu 24.04 with uv,
  outbound internet, Ollama pre-installed with the embeddinggemma:300m-qat-q8_0
  model, and Anthropic/OpenAI key passthrough. No agent is installed here.

base:
  image: ubuntu:24.04

passthrough:
  allow_external: true
  services:
    - name: anthropic
      key_env: ANTHROPIC_API_KEY
    - name: openai
      key_env: OPENAI_API_KEY

provision:
  setup_cmds:
    - apt-get update && apt-get install -y --no-install-recommends git curl ca-certificates && rm -rf /var/lib/apt/lists/*
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - mkdir -p /workspace
    - apt-get update && apt-get install -y --no-install-recommends zstd && rm -rf /var/lib/apt/lists/*
    - curl -fsSL https://ollama.com/install.sh | sh
    - nohup ollama serve > /dev/null 2>&1 & sleep 5 && ollama pull embeddinggemma:300m-qat-q8_0

readiness:
  - name: uv-installed
    command: uv --version
  - name: ollama-installed
    command: which ollama
