# Vendored from the amplifier-evaluation library builtin suite:
# amplifier-benchmark/tasks/energy_forecast_new_england/grader.yaml
#
# The library grader.yaml carried an `evaluations:` list with `steps` + `rubric`
# but no type discriminator (the library had a single hardcoded rubric grader).
# The only adaptation for our harness is the top-level `type: model_rubric` that
# our grader factory (graders/__init__.py make_grader) dispatches on. The weighted
# evaluations, their steps, and the point-weighted rubrics are copied verbatim so
# the grading signal is identical to the library task.
type: model_rubric
evaluations:
- name: implementation
  weight: 0.25
  steps: |
    1. Explore the /workspace directory to understand the full implementation.
    2. Look for dependency files (pyproject.toml, requirements.txt, etc.) to understand what ML libraries are used.
    3. Check for data acquisition code:
       - Does it download real historical energy data from a public source?
       - What source does it use? Is it a legitimate public energy or government data source?
       - How much data does it acquire? (At least 30 days of hourly data = 720+ data points)
    4. Check the ML implementation:
       - What algorithm is used? (Linear regression, random forest, gradient boosting, neural network, etc.)
       - Is there feature engineering beyond just raw demand values?
       - Look for time-based features (hour of day, day of week, month, holiday indicators)
       - Look for lagged features (previous hours/days demand)
       - Look for external features (temperature, weather data)
    5. Check for model validation:
       - Is there a train/test split or cross-validation?
       - Are evaluation metrics computed (RMSE, MAE, MAPE, etc.)?
    6. Check for a model_report.md that documents the approach.
    7. Check for a README.md with usage instructions.
  rubric:
    real_data_source:
      points: 15
      description: Does the code download real historical energy data from a legitimate public source? Verify the data source URL or API is real. Full credit for a regional grid operator's published data. 10 points for other legitimate energy or government data sources.
    sufficient_data_volume:
      points: 10
      description: Does the code acquire at least 30 days of hourly data (720+ data points)? More data is better. 10 points for 30+ days, 5 points for 7-30 days, 0 for less.
    ml_algorithm_quality:
      points: 25
      description: What ML algorithm is used? 25 points for gradient boosting, ensemble methods, or neural networks. 15 points for a single decision tree model or support vector regression. 5 points for linear regression or trivial approaches. 0 if no ML model.
    feature_engineering:
      points: 20
      description: 'Does the code perform meaningful feature engineering? Check for: time-based features (hour, day of week, month) worth 8 points; lagged demand features worth 6 points; rolling statistics (moving averages, etc.) worth 3 points; external data like weather worth 3 points.'
    model_validation:
      points: 10
      description: Is there model validation? 10 points for cross-validation or robust train/test methodology with reported metrics. 5 points for a simple train/test split with metrics. 0 for no validation.
    model_report_exists:
      points: 10
      description: Does model_report.md exist with a meaningful description of the data source, ML approach, feature engineering, and validation results?
    readme_exists:
      points: 10
      description: Does a README.md exist with clear usage and installation instructions?
- name: execution
  weight: 0.35
  steps: |
    1. Find the README.md to understand how to run the tool.
    2. Based on the README, install any required dependencies.
    3. Run the tool. This may take up to 20 minutes as it needs to download data and train a model.
       - If the tool fails or errors out, note the error and assign a score of 0.
    4. After completion, check that /workspace/forecast.json exists and is valid JSON.
    5. Validate the forecast structure:
       - Does it contain a "forecast" array with 24 entries?
       - Does each entry have "hour" and "demand_mw" (numeric) fields?
       - Are the hours sequential (1-hour increments)?
    6. Check that /workspace/model_report.md was generated and contains meaningful content.
    7. Verify demand values are in a reasonable range for New England
  rubric:
    tool_runs_successfully:
      points: 30
      description: Does the tool run without fatal errors and complete data download and model training?
    forecast_json_exists:
      points: 10
      description: Does /workspace/forecast.json exist and contain valid JSON?
    forecast_has_24_entries:
      points: 15
      description: Does the forecast array contain exactly 24 entries with sequential hourly timestamps?
    forecast_entry_structure:
      points: 10
      description: Does each entry have 'hour' (ISO 8601 string) and 'demand_mw' (numeric) fields?
    demand_values_reasonable_range:
      points: 20
      description: Are all 24 demand values within a plausible range for New England? Deduct points for values outside this range.
    model_report_generated:
      points: 15
      description: Does /workspace/model_report.md exist with meaningful content about the approach and results?
- name: plausibility
  weight: 0.4
  steps: |
    1. Read the forecast from /workspace/forecast.json.
    2. Determine what date range the forecast covers from the "hour" timestamps.
    3. Try to look up current/recent New England electricity demand from public sources to establish a baseline for what demand should look like.
    4. Look up current weather conditions and forecasts for the New England region to understand expected temperatures, which strongly influence electricity demand.
    5. Analyze the forecast for temporal patterns:
       - Does demand show expected daily patterns (lower at night around 2-5 AM, higher during day)?
       - Is there appropriate variation between hours (not flat or random)?
       - Do the peak and trough values align with typical New England patterns?
  rubric:
    daily_demand_pattern:
      points: 35
      description: Does the forecast show a realistic daily demand curve? Demand should be lower during nighttime hours (roughly 2-5 AM) and higher during daytime/evening. 35 points if the pattern is clearly visible and realistic. 20 points if there is some variation but the pattern is weak. 0 if demand is flat, random, or inversely patterned.
    hour_to_hour_variation:
      points: 25
      description: Is there reasonable hour-to-hour variation (not all the same value, not wildly jumping)? Adjacent hours should typically differ by less than 1,000 MW. 25 points for smooth, realistic transitions. 12 points for somewhat reasonable. 0 for flat or erratic.
    weather_consistency:
      points: 20
      description: Given current weather conditions and temperatures for the New England region, do the forecast demand levels make sense? Higher temperatures in summer or lower temperatures in winter should correspond to higher demand. 20 points if consistent with current conditions. 10 points if partially consistent. 0 if clearly inconsistent.
    overall_forecast_credibility:
      points: 20
      description: 'Overall assessment: would an energy analyst find this forecast credible as a rough next-day forecast? Consider all the above factors holistically.'
