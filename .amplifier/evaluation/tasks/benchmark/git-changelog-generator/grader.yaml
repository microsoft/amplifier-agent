# Vendored from the amplifier-evaluation library builtin suite:
# amplifier-benchmark/tasks/git_changelog_generator/grader.yaml
#
# The library grader.yaml carried an `evaluations:` list with `steps` + `rubric`
# but no type discriminator (the library had a single hardcoded rubric grader).
# The only adaptation for our harness is the top-level `type: model_rubric` that
# our grader factory (graders/__init__.py make_grader) dispatches on. The weighted
# evaluations, their steps, and the point-weighted rubrics are copied verbatim so
# the grading signal is identical to the library task.
type: model_rubric
evaluations:
- name: code_review
  weight: 0.4
  steps: "NOTE: The solution may use either direct LLM API calls (OpenAI, Anthropic) or an Agent SDK such as Claude Agent/Code SDK, Microsoft Amplifier (https://github.com/microsoft/amplifier/tree/next), OpenAI Codex CLI, or others that are similarly capable. Both approaches are acceptable. If an Agent SDK is used, its built-in LLM capabilities count as satisfying the LLM usage checks below.\n\n1. Explore the code in the project directory to understand the full implementation.\n2. Check that the solution uses **git** operations (via subprocess, gitpython, or similar) to retrieve commits between two references. Verify it actually runs git commands uses a git library to get the commit log, \nor relies on the agent to make the git call (any of these are acceptable).\n3. Check that the solution uses an **LLM to categorize and summarize** the commits into meaningful groups (not just dumping raw commit messages). This could be via direct API calls or an Agent SDK.\n4. Check for a **CLI interface** that accepts:\n   - A repository URL or local path\n   - Two commit references (tags, SHAs, or branches)\n   - An option to configure the output file path\n5. Check that the output is a **markdown file** with:\n   - Categorized sections (e.g., Features, Bug Fixes, etc.)\n   - Summarized descriptions within each category\n6. Check that a **README.md** exists with usage instructions and examples.\n7. Check for reasonable **error handling** (invalid refs, empty ranges, network errors).\n8. Verify the solution uses a recent, up-to-date LLM from Anthropic or OpenAI. If an Agent SDK is used, check which model it is configured with. Check the model identifier in the code against these references:\n    - Anthropic models: https://platform.claude.com/docs/en/about-claude/models/overview\n    - OpenAI models: https://platform.openai.com/docs/models\n"
  rubric:
    git_operations:
      points: 15
      description: Does the solution use git operations (subprocess, gitpython, or similar) to retrieve commits between two references? Check for actual git commands or library usage in the code.
    llm_categorization:
      points: 15
      description: Does the solution use an LLM to categorize and summarize commits into meaningful groups? It should not just dump raw commit messages. Agent SDKs with built-in LLM capabilities count.
    cli_interface:
      points: 10
      description: Does the CLI accept a repository URL or local path, two commit references, and a configurable output path?
    markdown_output:
      points: 10
      description: Does the code produce a markdown file with categorized sections and summarized descriptions?
    readme_exists:
      points: 10
      description: Does a README.md exist with usage instructions and examples?
    error_handling:
      points: 5
      description: Does the code handle edge cases like invalid refs, empty ranges, or network errors?
    clean_architecture:
      points: 10
      description: Is the code well-structured with separation between git operations, LLM processing, and output formatting?
    uses_recent_model:
      points: 25
      description: Does it use a recent model from Anthropic (see https://platform.claude.com/docs/en/about-claude/models/overview) or OpenAI (see https://platform.openai.com/docs/models)? If an Agent SDK is used, check which model it is configured with. 5 points partial credit if a model is used but it is not recent.
- name: functional
  weight: 0.6
  steps: |
    1. Find the README.md file that explains how to use the tool and what commands to run.
    2. Based on the README, install any required dependencies if needed.
    3. Run the tool against the microsoft/playwright repository with the range v1.45.0 to v1.47.0. The command should clone or reference the repo and generate a changelog between these two tags.
       - If the tool fails or errors out, note an overall score of 0 for this test.
       - This may take up to 20 minutes as it needs to clone the repo and process commits through an LLM.
    4. After the tool completes, locate the generated markdown changelog file.
    5. Read the official Playwright release notes that serve as ground truth for what actually changed:
       - /workspace/test_time_data/playwright_v1.46.0_release_notes.md (changes from v1.45.0 to v1.46.0)
       - /workspace/test_time_data/playwright_v1.47.0_release_notes.md (changes from v1.46.0 to v1.47.0)
    6. Compare the generated changelog against the official release notes. Evaluate how well the generated changelog captures the major features, changes, and fixes documented in the official notes. The changelog does not need to match the official notes word-for-word, but the key themes and changes should be represented.
    7. Check for content that is fabricated or hallucinated: does the generated changelog contain significant features or changes that are NOT in the official release notes or actual commits?
  rubric:
    tool_runs_successfully:
      points: 20
      description: Does the tool run without errors against microsoft/playwright v1.45.0..v1.47.0 and produce a markdown file?
    coverage_of_official_changes:
      points: 50
      description: How well does the generated changelog capture the major features and changes from the official release notes? Full points if most key items are represented. Partial credit proportionally.
    no_hallucinations:
      points: 30
      description: Is the changelog free of significant fabricated or hallucinated features that do not appear in the official release notes or actual commits?
