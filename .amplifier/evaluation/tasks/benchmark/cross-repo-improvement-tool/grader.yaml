# Vendored from the amplifier-evaluation library builtin suite:
# amplifier-benchmark/tasks/cross_repo_improvement_tool/grader.yaml
#
# The only adaptation for our harness is the top-level `type: model_rubric` that
# our grader factory (graders/__init__.py make_grader) dispatches on. The weighted
# evaluations, their steps, and the point-weighted rubric are copied verbatim so the
# grading signal is identical to the library task.
type: model_rubric
evaluations:
- name: architecture_review
  weight: 0.3
  steps: |
    1. Explore the code that the agent generated in this project directory to understand the tool's architecture.
    2. Check if the tool uses repomix correctly:
       - Look for where it invokes repomix (e.g., `npx repomix@latest` or similar)
       - Verify it can handle remote GitHub repositories (not just local repos)
       - Check that it processes both a source repo and a target repo
    3. Examine the feedback loop architecture:
       - Look for evidence of multiple distinct reviewers (e.g., grounding reviewer, philosophy/patterns reviewer, additional reviewers)
       - Check for analysis → draft → review → re-analysis loop patterns
       - Verify reviewers are implemented as isolated processes
       - Look for human review integration that allows comments and triggers re-analysis
    4. Check the overall architecture supports iterative refinement until content passes all reviews.
  rubric:
    repomix_integration:
      points: 20
      description: Does the tool use repomix (npx repomix or similar) for both source and target repos, with support for remote GitHub repos?
    feedback_loop_architecture:
      points: 30
      description: Is there clear evidence of analysis → draft → review → re-analysis loops with feedback passed back to analysis stages?
    multiple_reviewers:
      points: 25
      description: 'Are there multiple distinct reviewers (at least: grounding reviewer, philosophy/patterns reviewer, and one additional reviewer)?'
    human_review_integration:
      points: 15
      description: Is there a human review step that allows comments and triggers re-analysis with feedback?
    isolated_processes:
      points: 10
      description: Are reviews performed as separate, isolated processes as specified in requirements?
- name: run_and_validate
  weight: 0.7
  steps: |
    1. Find the README file that explains how to use the cross-repo improvement tool.
    2. Based on the README, determine the correct command to run the tool with these parameters:
       - Source repo: github/spec-kit
       - Target repo: github/copilot-cli
       - Improvement request: "Analyze how spec-kit's structured 4-phase workflow (Specify → Plan → Tasks → Implementation), validation checkpoints, and template system could improve copilot-cli's handling of complex coding tasks. Focus on how copilot-cli could adopt more structured planning capabilities while maintaining its conversational terminal-native experience."
    3. Run the command. This will take 10-20 minutes as it:
       - Runs repomix on both GitHub repositories
       - Performs multi-phase analysis with feedback loops
       - Generates comprehensive outputs
    4. Monitor the execution and check for any errors in stdout/stderr.
    5. After completion, examine the output structure:
       - Check if a timestamped or contextually-named output directory was created
       - Look for a comprehensive analysis file that includes:
         * High-level opportunities overview
         * Individual opportunity breakdowns
         * Value/rationale for each opportunity
       - Look for separate detailed proposal files for each opportunity containing:
         * Full context from the source repo
         * Implementation guidance for the target repo
         * Sufficient detail for handoff to a team without source access
       - Check if file/directory names are based on the input context (repos and request)
       - Look for evidence of review iterations (feedback files, iteration logs, etc.)
    6. Deeply examine the comprehensive analysis file for quality:
       - Are the identified opportunities actually present in github/spec-kit's codebase/patterns?
       - Do the opportunities make sense for github/copilot-cli's purpose and architecture?
       - Is the analysis grounded in actual code, patterns, and design from both repos (not generic advice)?
       - Does it demonstrate deep understanding of both tools' purposes and design philosophies?
    7. Select 2-3 individual proposal files and analyze them deeply:
       - Specificity: Do proposals reference actual code, patterns, or structures from spec-kit?
       - Applicability: Are suggestions realistic and appropriate for copilot-cli's architecture?
       - Implementation guidance: Is the guidance specific enough for a team to implement?
       - Completeness: Could a team implement these proposals without accessing spec-kit's source code?
       - Value: Would these improvements genuinely benefit copilot-cli users and align with its goals?
    8. Check for review quality evidence:
       - Are proposals grounded to both repos (not generic "best practices")?
       - Do suggestions align with copilot-cli's existing patterns and philosophy?
       - Is there evidence that multiple reviewers influenced the final quality?
    9. Overall assessment:
       - Would the GitHub team maintaining copilot-cli find this analysis valuable?
       - Are suggestions actionable, well-reasoned, and worth considering?
  rubric:
    readme_exists:
      points: 5
      description: Does a comprehensive README exist with clear usage instructions?
    tool_runs_successfully:
      points: 10
      description: Does the tool run without fatal errors?
    repomix_execution:
      points: 5
      description: Is there evidence the tool ran repomix on both repositories?
    comprehensive_analysis_file:
      points: 10
      description: Does output include comprehensive analysis with high-level to detailed opportunity breakdown and rationale?
    separate_proposal_files:
      points: 10
      description: Are individual opportunities documented in separate detailed proposal files?
    contextual_naming:
      points: 5
      description: Are output directories and files named based on the repos and request context?
    review_iteration_evidence:
      points: 5
      description: Is there evidence of feedback loop iterations (feedback files, version history, iteration logs)?
    opportunities_grounded_in_source:
      points: 15
      description: Do opportunities reference actual patterns/code from spec-kit (not generic suggestions)?
    appropriate_for_target:
      points: 10
      description: Do suggestions make sense for copilot-cli's purpose, architecture, and user experience?
    deep_understanding:
      points: 5
      description: Does analysis demonstrate deep understanding of both tools' designs and philosophies?
    proposal_specificity_and_guidance:
      points: 10
      description: Do proposals include specific references to source patterns with implementation guidance detailed enough for handoff without requiring source access?
    actionability_and_value:
      points: 10
      description: Are suggestions realistic, actionable, well-reasoned, and genuinely valuable to the copilot-cli team?
