# Vendored benchmark task: email_drafting
#
# Source: the amplifier-evaluation library's builtin benchmark suite, at
# amplifier-bundle-evaluation/amplifier-benchmark/tasks/email_drafting/ in a
# source checkout.
#
# Vendored (copied) here so runs are reproducible and independent of the library.
# The library split identity across meta.yaml + task.yaml; this consolidates them
# into our single-file schema:
#   library meta.yaml {name,difficulty,categories,timeout} -> id/difficulty/categories/timeout
#   library task.yaml `instructions:`                       -> `scenario:` (verbatim)
#   library grader.yaml                                     -> sibling grader.yaml (+ our `type:`)
#   library profile.yaml                                    -> sibling profile.yaml
# The library task ships a grader-data/ dir (sample emails/ and source_notes.txt the
# grader feeds the tool at grade time); it is copied verbatim to grader-data/ here.
# It ships no workspace/, so this task seeds an empty workspace/ (loader requires it).
#
# Source task id: `email_drafting`. Our id uses hyphens (`email-drafting`) because
# the harness derives the Incus container name from the task id, and Incus rejects
# underscores (names must be alphanumeric + hyphen).
id: email-drafting
description: >
  Agent must build a CLI tool that drafts an email in the user's communication
  style from rough notes, learning tone from a directory of past emails, with a
  writer plus content/tone/brevity reviewer loop, mode flags, an optional
  recipient parameter, and a bracket-comment feedback cycle. A cli_tool + ai_tool
  task.
difficulty: medium
categories: [cli_tool, ai_tool]

# Per-trial timeout in seconds for the agent run (from the library meta.yaml).
timeout: 5400

# The deliverable the grader inspects after extraction. The library task has the
# agent place code under scenarios/email_drafting/ and write the final email out
# to a file for review; the agent chooses the exact output filename, and the
# grader locates the generated email. This path is the expected/representative
# location under /workspace.
deliverable:
  path: /workspace/scenarios/email_drafting/draft.md
  description: >
    The drafted email the tool writes out for review, matching the user's style
    and (when a recipient is given) their style toward that recipient. The tool
    and its README live under /workspace/scenarios/email_drafting/; the exact
    output filename is the agent's choice and the grader locates it.

# References to the sibling files, resolved by the loader.
grader: grader.yaml
profile: profile.yaml

# The scenario handed to the AI User, verbatim from the library task.yaml
# `instructions:` field so the task's difficulty and signal are preserved.
scenario: |
  Create me a CLI tool that will take bullet points or rough notes about what I want to communicate and draft an email in my communication style. Place all the code under the directory scenarios/email_drafting.

  I should be able to point to a directory of my past emails for it to use to understand my tone, formality level, and communication patterns, and then also a source document that contains my key points or rough notes for this email. The tool should support an optional recipient parameter - when provided, it should prioritize past emails to/from that specific recipient to better match how I communicate with them.

  The tool should support mode flags to control email length: --mode concise (brief, essential points only), --mode standard (balanced, this is the default), and --mode detailed (comprehensive with context and background).

  From there, it should have a writer that can read all of that in and draft up a first pass, trying to match my communication style, tone, level of formality, and the specified brevity mode.

  Afterwards, it should pass the resulting draft and the input notes to a content-reviewer to verify that all key points from my notes are covered and nothing important was missed or misrepresented - if issues are found, give feedback and return it to the writer for improvement and back to the content-reviewer.

  After this, it should pass the draft and my past emails to a tone-reviewer to verify that it has captured my communication style, formality level, and typical email patterns - same deal, if not return to writer.

  Then, it should pass the draft to a brevity-reviewer to verify the email length is appropriate for the selected mode and that it's not unnecessarily verbose - if issues are found, give feedback and return to writer.

  Once it all passes, write the final version out for me to review. Give me the opportunity to mark up the email with [bracket-enclosed-comments] and then pass it back to the tool to incorporate my feedback as the final reviewer - start back with the writer and then review again with the other reviewers, including passing my feedback along with the other context they previously had.

  Finally, create a README.md under scenarios/email_drafting/ that gives examples of each of the commands that can be used to run the tool.
  You have an OPENAI_API_KEY and ANTHROPIC_API_KEY available for any LLM API calls you need to make.
