# Vendored from the amplifier-evaluation library builtin suite:
# amplifier-benchmark/tasks/arxiv_paper_summarizer/profile.yaml
#
# DTU profile copied verbatim from the library task. The library forwards both
# Anthropic and OpenAI key passthrough; both are kept intact (the OpenAI entry is
# harmless if the host key is absent). No agent-under-test is installed here:
# installing the agent is the agent's job (see agents/<name>/install.yaml).
name: eval-task-arxiv-paper-summarizer
description: Evaluation task environment for arxiv_paper_summarizer. Ubuntu 24.04 with uv, outbound internet, and Anthropic/OpenAI key passthrough.
base:
  image: ubuntu:24.04
passthrough:
  allow_external: true
  services:
  - name: anthropic
    key_env: ANTHROPIC_API_KEY
  - name: openai
    key_env: OPENAI_API_KEY
provision:
  setup_cmds:
  - apt-get update && apt-get install -y --no-install-recommends git curl ca-certificates && rm -rf /var/lib/apt/lists/*
  - curl -LsSf https://astral.sh/uv/install.sh | sh
  - mkdir -p /workspace
readiness:
- name: uv-installed
  command: uv --version
