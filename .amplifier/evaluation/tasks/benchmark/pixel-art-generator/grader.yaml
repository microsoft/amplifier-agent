# Vendored from the amplifier-evaluation library builtin suite:
# amplifier-benchmark/tasks/pixel_art_generator/grader.yaml
#
# The library grader.yaml carried an `evaluations:` list with `steps` + `rubric`
# but no type discriminator (the library had a single hardcoded rubric grader).
# The only adaptation for our harness is the top-level `type: model_rubric` that
# our grader factory (graders/__init__.py make_grader) dispatches on. The weighted
# evaluations, their steps, and the point-weighted rubrics are copied verbatim so
# the grading signal is identical to the library task.
#
# The functional evaluation references a validation script at
# /workspace/test_time_data/validate_sprites.py. That asset ships in this task's
# sibling grader-data/validate_sprites.py (copied verbatim from the library); the
# harness is responsible for placing grader-data assets where the grader expects.
type: model_rubric
evaluations:
- name: architecture
  weight: 0.3
  steps: |
    NOTE: The solution may use either direct OpenAI API calls or an Agent SDK such as Claude Agent/Code SDK, Microsoft Amplifier (https://github.com/microsoft/amplifier/tree/next), OpenAI Codex CLI, or others that are similarly capable. Both approaches are acceptable for the image generation API calls.

    1. First, look up the latest OpenAI image generation model by fetching https://platform.openai.com/docs/guides/image-generation. Note the recommended model name for image generation.
    2. Explore the code under scenarios/pixel_art_generator/ to understand the implementation.
    3. Check that the code uses an OpenAI image generation model. Compare the model used against what you found in the docs -- is it the latest recommended model?
    4. Check that the code requests a transparent background from the API so sprites can be used in games.
    5. Check that the post-processing pipeline produces actual pixel art:
       - Resizing must avoid blurring (nearest-neighbor interpolation, not bilinear/bicubic/lanczos)
       - Colors are reduced to a limited palette
       - Output is a PNG with an alpha channel (transparency)
    6. Verify the three CLI commands exist: generate, inspect, and batch, with the options described in the instructions (--size, --palette-size, --output, --output-dir).
    7. Check for a README with usage examples.
  rubric:
    uses_latest_model:
      points: 20
      description: Does the code use the latest OpenAI image generation model from the docs? State which model the docs recommend and which model the code uses. Full points if it matches, 10 points partial credit if it uses an older OpenAI image model.
    transparent_background:
      points: 15
      description: Does the code request a transparent background from the API so sprites are game-ready?
    no_blurry_resize:
      points: 15
      description: Does resizing use nearest-neighbor interpolation? Any smoothing/blurring interpolation method is wrong for pixel art.
    color_reduction:
      points: 15
      description: Does the code reduce colors to a limited palette?
    png_with_alpha:
      points: 10
      description: Does the code output PNGs with an alpha channel for transparency?
    cli_commands:
      points: 10
      description: Are the three commands (generate, inspect, batch) present with the expected options?
    readme_exists:
      points: 5
      description: Does a README exist with usage examples?
    code_quality:
      points: 10
      description: Is the code well-organized with reasonable error handling?
- name: functional
  weight: 0.7
  steps: |
    This test validates that the tool actually works end-to-end. A validation script is available at /workspace/test_time_data/validate_sprites.py that checks sprite properties.

    1. Read the README under scenarios/pixel_art_generator/ to learn how to run the tool.
    2. Install any required dependencies.
    3. Create the /workspace/test_outputs/ directory.

    4. Generate three sprites at different sizes:
       pixelart generate "a knight with a sword and shield" --size 32 --palette-size 16 --output /workspace/test_outputs/knight.png
       pixelart generate "a health potion bottle" --size 64 --palette-size 8 --output /workspace/test_outputs/potion.png
       pixelart generate "a treasure chest with gold coins" --size 16 --palette-size 12 --output /workspace/test_outputs/chest.png

    5. Run the inspect command on one of the sprites and check the output looks reasonable.

    6. Test batch mode. Create /workspace/test_outputs/batch_input.json with:
       [
         {"name": "tree", "description": "a pixel art oak tree"},
         {"name": "gem", "description": "a blue diamond gemstone"}
       ]
       Then run: pixelart batch /workspace/test_outputs/batch_input.json --size 32 --output-dir /workspace/test_outputs/batch/

    7. Run the validation script on the generated sprites:
       uv run --with Pillow /workspace/test_time_data/validate_sprites.py /workspace/test_outputs/ --expected-size 32 --expected-palette 16
       Note: this will validate all PNGs recursively. The --expected-size and --expected-palette flags are global hints -- some sprites have different sizes, so focus on whether each sprite matches what was requested for it.

    8. Read the validation output carefully. Check if sprites pass: dimensions, background removal (transparency), color palette limits, and anti-aliasing checks.

    9. Visually assess: do the sprites look like pixel art you could use in a game?
  rubric:
    generate_works:
      points: 15
      description: Does the generate command run and produce PNG files?
    inspect_works:
      points: 5
      description: Does the inspect command show useful sprite info?
    correct_dimensions:
      points: 15
      description: Do sprites match their requested --size (32x32, 64x64, 16x16)?
    correct_palette:
      points: 10
      description: Are color counts within the requested --palette-size limits?
    has_transparency:
      points: 10
      description: Do sprites have transparent backgrounds (not white or solid)?
    no_antialiasing:
      points: 5
      description: Do sprites pass the anti-aliasing check from the validation script?
    batch_works:
      points: 10
      description: Does batch mode produce the expected sprite files?
    looks_like_pixel_art:
      points: 15
      description: Do the sprites look like actual pixel art? Blocky, limited colors, no smooth gradients.
    game_ready:
      points: 15
      description: Could these sprites be dropped into a game? Transparent background, clean edges, recognizable subjects.
