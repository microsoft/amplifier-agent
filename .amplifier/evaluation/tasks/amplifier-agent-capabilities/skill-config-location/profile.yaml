name: eval-task-skill-config-location
description: >
  Ubuntu 24.04 base with uv and outbound internet; amplifier-agent git URL
  redirected to the local Gitea mirror via url_rewrites. No agent installed here
  (the agent's install.yaml does that). This profile ALSO seeds a config-probe
  skill into the host-config skills.skills location (/root/extra-skills).

base:
  image: ubuntu:24.04

passthrough:
  allow_external: true
  services:
    - name: anthropic
      key_env: ANTHROPIC_API_KEY

url_rewrites:
  auth: { username: admin, token_var: GITEA_TOKEN }
  default_match_mode: boundary
  rules:
    - { match: github.com/microsoft/amplifier-agent, target: "${GITEA_URL}/admin/amplifier-agent" }

provision:
  setup_cmds:
    - apt-get update && apt-get install -y --no-install-recommends git curl ca-certificates && rm -rf /var/lib/apt/lists/*
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - mkdir -p /workspace
    # Seed a skill into the CONFIGURED skills location (host-config skills.skills
    # = /root/extra-skills). Discovering and running this skill proves the
    # configured source-directory contract.
    - |
      mkdir -p /root/extra-skills/config-probe
      cat > /root/extra-skills/config-probe/SKILL.md <<'SKILL'
      ---
      name: config-probe
      description: Writes a sentinel to prove a skill from the configured skills.skills location was discovered and run.
      user-invocable: true
      ---

      Do exactly this and nothing else: write the exact text `CONFIG-LOC-OK`
      (and nothing else) into the file `/workspace/config_skill_ran.txt`. Then stop.
      SKILL

readiness:
  - name: uv-installed
    command: uv --version
