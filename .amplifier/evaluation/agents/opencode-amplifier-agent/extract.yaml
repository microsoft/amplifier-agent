# Agent-owned extraction hints (renamed from the library's data.yaml).
# Describes WHERE this agent's sessions, artifacts, and metrics live inside the
# DTU. The Extractor agent (added in a later stage) combines these hints with
# the task's deliverable pointer to pull files out of the container.
#
# The events.jsonl files below are the authoritative token/cost/timing source
# (Amplifier event format, llm:response events).
session_data:
  amplifier_agent_events:
    base_path: /root/.amplifier-agent/state/workspaces/opencode/sessions
    glob: "**/context-intelligence/events.jsonl"
    note: Pull ALL of these; they hold token usage and cost for the agent run.
  opencode_storage:
    base_path: /root/.local/share/opencode
    note: opencode sqlite db and logs (secondary).

# Agent-owned SEED target for the session-seeding seam. When a task
# ships a seed/ directory of prior Amplifier-agent sessions, the lifecycle plants
# them here BEFORE the agent runs, so the agent can recall them. This is the same
# on-disk session store the amplifier-agent (context-intelligence) writes its own
# sessions to and reads prior ones from; each planted session dir lands as
# <base_path>/<session-id>/ with a context-intelligence/events.jsonl inside.
seed_target:
  base_path: /root/.amplifier-agent/state/workspaces/opencode/sessions

workspace:
  path: /workspace

# Prose hint for the metrics-extraction phase. The extractor reads the pulled
# session logs and produces one normalized record. Field names drift by provider,
# so it inspects the real keys rather than assuming.
metrics:
  produce: [input_tokens, output_tokens, cache_read, cache_write, total_tokens, cost_usd, wallclock_s, llm_responses]
  description: >
    Token usage and cost live on `llm:response` events in the amplifier-agent
    events.jsonl files (one JSON object per line) under
    /root/.amplifier-agent/state/workspaces/opencode/sessions, in each session's
    context-intelligence/events.jsonl. Sum across ALL of them. On each
    `llm:response` event the usage is under `data.usage`; this Rust stack uses
    the `_tokens`-suffixed keys `input_tokens`, `output_tokens`,
    `cache_read_tokens`, `cache_write_tokens`, and DOES record a per-response
    dollar cost as `cost_usd` (often a string like "0.0187") which you should
    sum into cost_usd. Confirm the exact keys by opening a file first.
    total_tokens = input_tokens + output_tokens. llm_responses = the count of
    `llm:response` events. Derive wallclock_s from the earliest to the latest
    event `timestamp` (ISO-8601, may include nanoseconds).
