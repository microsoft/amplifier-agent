# Agent-owned extraction hints (renamed from the library's data.yaml).
# Describes WHERE this agent's sessions, artifacts, and metrics live inside the
# DTU. The Extractor agent combines these hints with the task's deliverable
# pointer to pull files out of the container.
#
# Unlike opencode-amplifier-agent (whose metrics live in amplifier-agent
# events.jsonl), vanilla opencode records per-session token usage and cost in a
# SQLite database at /root/.local/share/opencode/opencode.db. That db is the
# authoritative token/cost source here; there is no events.jsonl for this agent.
session_data:
  opencode_db:
    base_path: /root/.local/share/opencode
    glob: "opencode.db*"
    note: >
      The opencode SQLite database. In current opencode versions this is the
      AUTHORITATIVE token/cost source: a `session` table with
      tokens_input/tokens_output/tokens_cache_read/tokens_cache_write/cost/directory,
      and a `message` table for assistant-message counts. The glob is
      `opencode.db*` on purpose: opencode runs the db in WAL mode, so the most
      recent writes live in the `opencode.db-wal` (and `opencode.db-shm`) sidecar
      files. Pull ALL of them together so the copied db is complete; pulling
      `opencode.db` alone yields a STALE database missing the task session's data.
  opencode_storage:
    base_path: /root/.local/share/opencode/storage
    glob: "**/*.json"
    note: >
      Older opencode versions persist per-message usage as JSON here instead of
      opencode.db. Pull these if the directory exists (harmless if it does not).
  opencode_logs:
    base_path: /root/.local/share/opencode/log
    note: opencode run logs (secondary, best-effort).

# Agent-owned SEED target for the session-seeding seam. Prior sessions
# ARE planted here for this agent too -- so the study seeds every arm identically
# -- but vanilla opencode has NO context-intelligence recall: it never reads this
# amplifier-agent session store, and its own extraction pulls only the opencode
# db under /root/.local/share/opencode. So vanilla is "seeded but cannot recall",
# and the seeded amplifier events never enter its metrics (opencode.db source),
# which is exactly the by-design low-score / no-contamination arm.
seed_target:
  base_path: /root/.amplifier-agent/state/workspaces/opencode/sessions

workspace:
  path: /workspace

# Prose hint for the metrics-extraction phase. The extractor reads the pulled
# opencode data and produces one normalized record. opencode's layout varies by
# version, so it inspects the real files rather than assuming.
metrics:
  produce: [input_tokens, output_tokens, cache_read, cache_write, total_tokens, cost_usd, wallclock_s, llm_responses]
  description: >
    Vanilla opencode records token usage and cost in its SQLite database, pulled
    into this run's extraction as opencode.db. Open it read-only. The `session`
    table has one row per session with tokens_input, tokens_output,
    tokens_cache_read, tokens_cache_write, cost, and directory; map
    input_tokens=tokens_input, output_tokens=tokens_output,
    cache_read=tokens_cache_read, cache_write=tokens_cache_write, cost_usd=cost,
    and total_tokens=tokens_input+tokens_output. IMPORTANT: count ONLY the real
    task session, whose directory is /workspace; EXCLUDE the install-time warm-up
    session (it runs from /root with the message "reply with exactly: ok").
    llm_responses = the number of assistant messages for that session in the
    `message` table (role="assistant"). Derive wallclock_s from that session's
    timestamps (time_created / time_updated are epoch MILLISECONDS; convert ms to
    seconds). If opencode.db is absent, older opencode versions instead store
    per-message JSON under /root/.local/share/opencode/storage (assistant
    messages carrying a `tokens` object and `cost`); use those. Open a file first
    to confirm the exact structure.
